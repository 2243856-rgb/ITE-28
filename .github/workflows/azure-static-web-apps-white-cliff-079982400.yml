# Azure Static Web Apps CI/CD
#
# Deploy uses @azure/static-web-apps-cli (npx) instead of Azure/static-web-apps-deploy@v1
# because that official action builds a Docker image from
# mcr.microsoft.com/appsvc/staticappsclient — which can fail with HTTP 403 on some runners.
#
# PR preview teardown used to run via the official action (action: close). That path also
# required Docker; preview environments may need manual cleanup in Azure Portal if needed.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - test

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - test

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: true

      - name: Build Expo Web App
        working-directory: ./frontend
        env:
          # Set in GitHub → Settings → Secrets and variables → Actions:
          # EXPO_PUBLIC_API_URL = https://YOUR-APP-NAME.azurewebsites.net/api/v1
          # If unset, frontend falls back to the URL in src/config/env.js (must match your live API).
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo export --platform web

      - name: Inject web API URL (Azure Static Web Apps)
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: node .github/scripts/inject-web-api-url.js

      - name: Deploy to Azure Static Web Apps (SWA CLI)
        working-directory: ./frontend
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_CLIFF_079982400 }}
        run: |
          set -euo pipefail
          if [ -z "${SWA_CLI_DEPLOYMENT_TOKEN:-}" ]; then
            echo "::error::Missing secret AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_CLIFF_079982400 (deployment token)."
            exit 1
          fi
          if [ ! -d dist ]; then
            echo "::error::frontend/dist not found after export."
            exit 1
          fi
          SWA_ENV=production
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SWA_ENV=preview
          fi
          npx --yes @azure/static-web-apps-cli@2.0.9 deploy dist --env "$SWA_ENV"
